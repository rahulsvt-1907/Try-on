<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Stylish AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);">

  <!-- Navbar -->
  <nav class="bg-white shadow-lg px-6 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center space-x-4">
      <a href="/">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="w-10 h-10 mr-2" />
      </a>
      <a href="/" class="text-3xl font-bold text-black tracking-tight">
        Stylish <span class="text-purple-600">AI</span>
      </a>
    </div>
    <div class="flex items-center space-x-8">
      <a href="/" class="text-gray-700 hover:text-purple-600 font-medium transition">Home</a>
      <a href="/tryon" class="text-gray-700 hover:text-purple-600 font-medium transition">Try-On</a>
      <button
        id="profile-btn"
        onclick="openProfileModal()"
        class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition"
      >
        Create Profile
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Profile Modal -->
  <div id="profile-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md relative">
      <button onclick="closeProfileModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      <h2 class="text-2xl font-bold text-gray-800 mb-6" id="modal-title">Create Profile</h2>
      <form id="profile-form" onsubmit="saveProfile(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input type="text" id="profile-name" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
            placeholder="Your name" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
          <select id="profile-sex"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400">
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Height (cm)</label>
            <input type="number" id="profile-height"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
              placeholder="e.g. 170" min="100" max="250" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Chest (cm)</label>
            <input type="number" id="profile-chest"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
              placeholder="e.g. 90" min="50" max="200" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Waist (cm)</label>
            <input type="number" id="profile-waist"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
              placeholder="e.g. 75" min="40" max="200" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Hips (cm)</label>
            <input type="number" id="profile-hips"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
              placeholder="e.g. 95" min="50" max="200" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Profile Photo</label>
          <input type="file" id="profile-image-input" accept="image/*"
            class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100"
            onchange="previewProfileImage(event)" />
          <img id="profile-preview" class="mt-2 w-20 h-20 rounded-full object-cover hidden" alt="Profile preview" />
        </div>
        <button type="submit"
          class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg font-semibold hover:from-purple-600 hover:to-pink-600 transition">
          Save Profile
        </button>
      </form>
    </div>
  </div>

  <script>
    // Profile management using localStorage
    function loadProfile() {
      try {
        const stored = localStorage.getItem('styleAIProfile');
        if (stored) return JSON.parse(stored);
      } catch (e) {}
      return null;
    }

    function openProfileModal() {
      const profile = loadProfile();
      if (profile) {
        document.getElementById('modal-title').textContent = 'Edit Profile';
        document.getElementById('profile-name').value = profile.name || '';
        document.getElementById('profile-sex').value = profile.sex || '';
        document.getElementById('profile-height').value = profile.height || '';
        document.getElementById('profile-chest').value = profile.chest || '';
        document.getElementById('profile-waist').value = profile.waist || '';
        document.getElementById('profile-hips').value = profile.hips || '';
        if (profile.image) {
          const preview = document.getElementById('profile-preview');
          preview.src = profile.image;
          preview.classList.remove('hidden');
        }
      } else {
        document.getElementById('modal-title').textContent = 'Create Profile';
        document.getElementById('profile-form').reset();
        document.getElementById('profile-preview').classList.add('hidden');
      }
      document.getElementById('profile-modal').classList.remove('hidden');
    }

    function closeProfileModal() {
      document.getElementById('profile-modal').classList.add('hidden');
    }

    function previewProfileImage(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const preview = document.getElementById('profile-preview');
        preview.src = e.target.result;
        preview.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function saveProfile(event) {
      event.preventDefault();
      const name = document.getElementById('profile-name').value.trim();
      const sex = document.getElementById('profile-sex').value;
      const height = document.getElementById('profile-height').value;
      const chest = document.getElementById('profile-chest').value;
      const waist = document.getElementById('profile-waist').value;
      const hips = document.getElementById('profile-hips').value;
      const preview = document.getElementById('profile-preview');
      const image = preview.classList.contains('hidden') ? null : preview.src;

      const profile = { name, sex, height, chest, waist, hips, image };
      localStorage.setItem('styleAIProfile', JSON.stringify(profile));
      closeProfileModal();
      updateNavbarProfile(profile);
    }

    function updateNavbarProfile(profile) {
      const btn = document.getElementById('profile-btn');
      if (!btn) return;
      if (profile && profile.name) {
        if (profile.image) {
          btn.innerHTML = `<img src="${profile.image}" alt="Profile" class="w-8 h-8 rounded-full object-cover inline-block mr-2 border-2 border-purple-200" /><span>${profile.name}</span>`;
        } else {
          btn.textContent = profile.name;
        }
        btn.className = 'flex items-center gap-2 px-4 py-2 text-gray-700 font-medium hover:text-purple-600 transition';
      }
    }

    // On page load, restore profile in navbar
    document.addEventListener('DOMContentLoaded', function() {
      const profile = loadProfile();
      if (profile) updateNavbarProfile(profile);
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
