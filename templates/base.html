<!DOCTYPE html>
<html lang="en" x-data="authStore()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Stylish AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="min-h-screen bg-slate-100">
  <nav class="bg-white shadow px-6 py-4 flex justify-between">
    <a href="/" class="font-bold text-2xl">Stylish <span class="text-purple-600">AI</span></a>
    <div class="flex gap-4 items-center">
      <a href="/tryon">Try-On</a>
      <button x-show="!token" @click="showAuth = !showAuth" class="px-3 py-2 bg-purple-600 text-white rounded">Login</button>
      <span x-show="token" class="text-sm text-emerald-700">Authenticated</span>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-6">{% block content %}{% endblock %}</main>

<script>
function authStore(){
  return {
    showAuth:false,
    token: localStorage.getItem('token') || '',
  }
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
