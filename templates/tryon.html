{% extends "base.html" %}
{% block content %}
<div class="grid md:grid-cols-2 gap-6" x-data="tryonForm()">
  <form id="tryon-form" class="bg-white rounded-xl p-4 shadow space-y-3" enctype="multipart/form-data">
    <h2 class="font-semibold text-lg">AI Try-On</h2>
    <input type="file" name="avatar_image" accept="image/*" class="w-full border rounded p-2" required>
    <input type="file" name="clothing_image" accept="image/*" class="w-full border rounded p-2" required>
    <input type="text" name="clothing_prompt" placeholder="Clothing prompt" class="w-full border rounded p-2">
    <input type="text" name="background_prompt" placeholder="Background prompt" class="w-full border rounded p-2">
    <button type="button" @click="submitTryOn" class="w-full bg-purple-600 text-white py-2 rounded">Generate</button>
    <div x-show="loading" class="animate-pulse bg-gray-200 h-16 rounded"></div>
  </form>
  <section class="bg-white rounded-xl p-4 shadow">
    <h3 class="font-semibold mb-3">Result</h3>
    <img x-show="result" :src="result" class="rounded w-full" alt="Try-on result">
    <p class="text-sm mt-2" x-text="description"></p>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>
function tryonForm(){
  return {
    loading:false,
    result:'',
    description:'',
    async submitTryOn(){
      const form = document.getElementById('tryon-form');
      const token = localStorage.getItem('token');
      if(!token){ alert('Login first via /docs /auth/login'); return; }
      this.loading = true;
      const res = await fetch('/api/tryon',{method:'POST',headers:{'Authorization':'Bearer '+token},body:new FormData(form)});
      const data = await res.json();
      this.loading = false;
      if(!res.ok){ alert(data.detail || 'Try-on failed'); return; }
      this.result = 'data:image/png;base64,' + data.image_base64;
      this.description = data.description + ` (in ${data.metadata.duration_ms}ms)`;
    }
  }
}
</script>
{% endblock %}
