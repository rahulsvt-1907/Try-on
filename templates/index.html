{% extends "base.html" %}
{% block title %}Catalog — Stylish AI{% endblock %}
{% block content %}
<div class="mb-5 flex flex-wrap gap-3 bg-white rounded-xl p-4 shadow">
  <input id="search" name="q" placeholder="Search..." class="border rounded px-3 py-2"
    hx-get="/api/clothing/fragment/grid" hx-trigger="keyup changed delay:300ms" hx-target="#pins-grid" hx-include="#gender,#category,#search" />
  <select id="gender" name="gender" class="border rounded px-2 py-2"
    hx-get="/api/clothing/fragment/grid" hx-trigger="change" hx-target="#pins-grid" hx-include="#gender,#category,#search">
    <option>All</option><option>Male</option><option>Female</option>
  </select>
  <select id="category" name="category" class="border rounded px-2 py-2"
    hx-get="/api/clothing/fragment/grid" hx-trigger="change" hx-target="#pins-grid" hx-include="#gender,#category,#search">
    <option>All</option>
    {% for cat in categories %}<option>{{ cat }}</option>{% endfor %}
  </select>
</div>
<div id="pins-grid">{% include 'partials/pins_grid.html' %}</div>
{% endblock %}
